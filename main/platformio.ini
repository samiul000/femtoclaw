; femtoclaw_mcu : PlatformIO project configuration
; Boards: ESP32, ESP32-S3, ESP32-C3, Raspberry Pi Pico W
; ─────────────────────────────────────────────────────────────────────────
; Usage:
;   pio run -e esp32c3        # build for ESP32-C3 Super Mini
;   pio run -e esp32          # build for ESP32
;   pio run -e picow          # build for Raspberry Pi Pico W
; ─────────────────────────────────────────────────────────────────────────
; NOTE: Change board name according to your board name before compiling.
;       Defaults works fine.
;       Uncomment -> lib_deps = ${common.lib_deps} /
;                    lib_deps = ${common_esp32.lib_deps}
;       in build_flags to use the external libraries.
; ─────────────────────────────────────────────────────────────────────────

[platformio]
default_envs = esp32c3

; ─────────────────────────────────────────────────────────────────────────
; Optional external display libraries : uncomment the ones you need,
; then add the matching build flag in your env's build_flags:
;
;   OLED SSD1306  → uncomment lib + add  -DBOARD_HAS_OLED_SSD1306
;   TFT ILI9341   → uncomment lib + add  -DBOARD_HAS_TFT_ILI9341
;   TFT ST7789    → uncomment lib + add  -DBOARD_HAS_TFT_ST7789
;
; NOTE: Adafruit GFX is required by all three display libraries above.
;       Uncomment it whenever you uncomment any display library.
;       It's preferred to change the library version accordingly.
; ─────────────────────────────────────────────────────────────────────────
[common]
build_flags =
    -Os
    -ffunction-sections
    -fdata-sections
    -Wl,--gc-sections
    -DCORE_DEBUG_LEVEL=0
; lib_deps =
;     adafruit/Adafruit GFX Library @ ^1.11.9          ; required by all display libs below
;     adafruit/Adafruit SSD1306 @ ^2.5.9               ; I2C OLED  —> enable: -DBOARD_HAS_OLED_SSD1306
;     adafruit/Adafruit ILI9341 @ ^1.6.0               ; SPI TFT   —> enable: -DBOARD_HAS_TFT_ILI9341
;     adafruit/Adafruit ST7735 and ST7789 Library @ ^1.10.3  ; SPI TFT   —> enable: -DBOARD_HAS_TFT_ST7789

; ─────────────────────────────────────────────────────────────────────────
; Optional external servo libraries : uncomment the ones you need,
; then add the matching build flag in your env's build_flags:
;
;   Servo  → uncomment lib + add  -DBOARD_HAS_SERVO
;
; NOTE: Pico W users don't need ESP32Servo as Servo.h is built into the
;       earlephilhower core and requires no lib_deps entry.
; ─────────────────────────────────────────────────────────────────────────
[common_esp32]
build_flags =
    ${common.build_flags}
    -w
    -DCONFIG_ESP_TASK_WDT_TIMEOUT_S=30
    -DBOARD_ESP32
    -DCONFIG_MBEDTLS_SSL_MAX_CONTENT_LEN=4096
; lib_deps =
;     ${common.lib_deps}                               ; inherit display libs from [common] if enabled
;     madhephaestus/ESP32Servo @ ^0.13.0               ; Servo motor —> enable: -DBOARD_HAS_SERVO in build_flags

; ── ESP32 generic devkit ──────────────────────────────────────────────────
[env:esp32]
platform       = espressif32@6.9.0
board          = esp32dev
framework      = arduino
monitor_speed  = 115200
upload_speed   = 921600
build_type     = release
build_flags    = ${common_esp32.build_flags}
; lib_deps     = ${common_esp32.lib_deps}

; ── ESP32-S3 ──────────────────────────────────────────────────────────────
[env:esp32s3]
platform       = espressif32@6.9.0
board          = esp32-s3-devkitc-1
framework      = arduino
monitor_speed  = 115200
upload_speed   = 921600
build_type     = release
build_flags =
    ${common_esp32.build_flags}
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
; lib_deps     = ${common_esp32.lib_deps}

; ── ESP32-C3 (RISC-V) — Super Mini ───────────────────────────────────────
[env:esp32c3]
platform       = espressif32@6.9.0
board          = lolin_c3_mini
framework      = arduino
board_build.flash_mode = dio
board_build.f_flash   = 40000000L
monitor_speed  = 115200
upload_speed   = 460800
build_type     = release
build_unflags  = -std=gnu++11
build_flags =
    ${common_esp32.build_flags}
    -std=gnu++17
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
monitor_filters =
    direct
    colorize
monitor_dtr    = 0
monitor_rts    = 0
; lib_deps     = ${common_esp32.lib_deps}

; ── Raspberry Pi Pico W ───────────────────────────────────────────────────
[env:picow]
platform             = https://github.com/maxgerhardt/platform-raspberrypi.git
board                = rpipicow
framework            = arduino
monitor_speed        = 115200
board_build.core     = earlephilhower
build_flags =
    ${common.build_flags}
    -DBOARD_PICO_W
    -DPICO_CYW43_ARCH_THREADSAFE_BACKGROUND=1
; lib_deps     = ${common.lib_deps}
